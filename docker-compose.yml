# FormFlow — ambiente local (PostgreSQL + Redis)
# Uso: docker compose up -d && pnpm db:migrate && pnpm db:seed

services:
  postgres:
    image: postgres:16-alpine
    container_name: formflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: formflow
      POSTGRES_PASSWORD: formflow
      POSTGRES_DB: formflow
    ports:
      - "5432:5432"
    volumes:
      - formflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formflow -d formflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: formflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - formflow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  formflow_pgdata:
  formflow_redisdata:
